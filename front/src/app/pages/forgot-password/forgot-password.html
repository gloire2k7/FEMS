<div class="min-h-screen flex font-['Poppins'] overflow-hidden bg-white">

  <div class="w-full lg:w-[45%] flex flex-col justify-center px-8 sm:px-12 md:px-20 lg:px-24">
    <div class="max-w-[360px] w-full mx-auto">

      <div class="mb-8">
        <h1 class="text-[22px] font-semibold text-[#1B2559] leading-tight tracking-tight">
          Forgot your<br>
          <span class="font-extrabold text-[24px]">Password?</span>
        </h1>
        <p class="mt-2 text-[12px] font-medium text-[#A3AED0] tracking-wide">
          {{ sent ? 'Enter the code we emailed you on the next screen' : 'Enter your email to receive a verification code' }}
        </p>
      </div>

      <div *ngIf="sent" class="rounded-xl bg-emerald-50 border border-emerald-100 p-4 mb-6">
        <p class="text-[13px] font-semibold text-emerald-800 mb-1">Check your inbox</p>
        <p class="text-[12px] text-emerald-700 leading-relaxed">
          If an account exists for <strong>{{ email }}</strong>, we sent a 6-digit code.
          It expires in <strong>10 minutes</strong>.
        </p>
        <button type="button" (click)="continueToReset()"
          class="mt-4 w-full bg-[#0B1437] text-white py-2.5 rounded-xl text-[12px] font-black uppercase tracking-widest hover:bg-black transition-all">
          Enter verification code
        </button>
        <button type="button" (click)="resendCode()" [disabled]="isLoading"
          class="mt-3 w-full text-[12px] font-bold text-[#0B1437] hover:underline disabled:opacity-50">
          {{ isLoading ? 'Sending…' : 'Resend code' }}
        </button>
      </div>

      <form *ngIf="!sent" (submit)="onSubmit()" class="space-y-6">
        <div *ngIf="error" class="text-red-500 text-[12px] font-semibold text-center mb-4">
          {{ error }}
        </div>

        <div class="group">
          <label class="block text-[11px] font-bold text-[#A3AED0] uppercase tracking-widest mb-1 ml-1">Email</label>
          <div class="relative flex items-center border-b border-[#E0E5F2] group-focus-within:border-blue-500 transition-all pb-1">
            <input type="email" name="email" [(ngModel)]="email" placeholder="you@company.com"
              class="auth-input w-full bg-transparent border-none py-1.5 text-[13px] font-semibold text-[#1B2559] outline-none" required />
            <i data-lucide="mail" class="w-3.5 h-3.5 text-[#1B2559] opacity-60"></i>
          </div>
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full bg-[#0B1437] text-white py-2.5 rounded-xl text-[12px] font-black uppercase tracking-widest shadow-xl shadow-blue-900/10 hover:bg-black transition-all disabled:opacity-50 mt-8">
          {{ isLoading ? 'Sending…' : 'Send verification code' }}
        </button>
      </form>

      <p class="mt-6 text-center text-[12px] text-[#A3AED0]">
        Remember your password?
        <a routerLink="/signin" class="font-bold text-[#0B1437] hover:underline ml-1">Back to sign in</a>
      </p>

    </div>
  </div>

  <div class="hidden lg:flex w-[55%] bg-[#0B1437] items-center justify-center relative overflow-hidden">
    <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-500/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-indigo-500/10 rounded-full blur-[100px]"></div>
    <div class="relative z-10 w-full max-w-[500px] px-12">
      <img src="Image.jpg" class="w-full h-auto drop-shadow-2xl" alt="Illustration">
    </div>
  </div>

</div>
