<aside
  class="fems-sidebar bg-gradient-to-b from-[#0B1437] to-[#020617] p-4 md:p-6 flex flex-col h-screen shrink-0 overflow-y-auto transition-all duration-300 z-40 fixed lg:static inset-y-0 left-0 -translate-x-full lg:translate-x-0"
  [class.translate-x-0]="sidebar.mobileOpen()"
  [class.w-64]="!sidebar.collapsed() || sidebar.mobileOpen()"
  [class.lg:w-64]="!sidebar.collapsed()"
  [class.lg:w-[4.5rem]]="sidebar.collapsed()"
  [class.is-collapsed]="sidebar.collapsed()">

  <div class="flex items-center gap-2 mb-8 pl-1">
    <div class="w-10 h-10 rounded-xl bg-emerald-600/90 flex items-center justify-center shrink-0">
      <i data-lucide="clipboard-check" class="w-5 h-5 text-white"></i>
    </div>
    <div *ngIf="!sidebar.collapsed()" class="min-w-0 flex-1">
      <span class="text-xl font-bold text-white tracking-wide block">FEMS</span>
      <p class="text-xs text-slate-400 font-medium">Inspector portal</p>
    </div>
    <button type="button" (click)="toggleSidebar()" title="Collapse sidebar"
      class="hidden lg:flex p-2 rounded-lg text-slate-400 hover:bg-white/10 hover:text-white transition-colors shrink-0">
      <i [attr.data-lucide]="sidebar.collapsed() ? 'panel-left-open' : 'panel-left-close'" class="w-4 h-4"></i>
    </button>
    <button type="button" (click)="sidebar.closeMobile()" title="Close menu"
      class="lg:hidden p-2 rounded-lg text-slate-400 hover:bg-white/10 hover:text-white transition-colors shrink-0">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
  </div>

  <nav class="space-y-1 text-base flex-1">
    <a routerLink="/inspector-dashboard" routerLinkActive="bg-white/10 text-white" [routerLinkActiveOptions]="{ exact: true }"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Dashboard</span>
    </a>
    <a routerLink="/inspector-inspections" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="search" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Inspections</span>
    </a>
    <a routerLink="/inspector-my-inspections" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="list-checks" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">My inspections</span>
    </a>
    <a routerLink="/inspector-mandatory-inspections" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="calendar-check" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Mandatory</span>
    </a>
    <a routerLink="/inspector-reports" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="file-text" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Reports</span>
    </a>
    <a routerLink="/inspector-notifications" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="bell" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Notifications</span>
    </a>
    <a routerLink="/inspector-settings" routerLinkActive="bg-white/10 text-white"
      (click)="sidebar.closeMobile()"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
      [class.justify-center]="sidebar.collapsed()" [class.px-3]="sidebar.collapsed()">
      <i data-lucide="settings" class="w-5 h-5 shrink-0"></i>
      <span *ngIf="!sidebar.collapsed()" class="font-medium">Settings</span>
    </a>
  </nav>

  <div class="mt-auto pt-6">
    <div class="bg-white/5 rounded-xl p-3 flex items-center gap-3 border border-white/5"
      [class.justify-center]="sidebar.collapsed()">
      <img [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=059669&color=fff'" alt=""
        class="w-10 h-10 rounded-full shrink-0">
      <div *ngIf="!sidebar.collapsed()" class="min-w-0 flex-1">
        <p class="text-sm text-slate-400">Signed in as</p>
        <p class="text-base font-semibold text-white truncate">{{ userName }}</p>
      </div>
      <button *ngIf="!sidebar.collapsed()" type="button" (click)="onLogout()" title="Sign out"
        class="p-2 rounded-lg hover:bg-white/10 text-slate-400 hover:text-red-400 transition-colors">
        <i data-lucide="log-out" class="w-5 h-5"></i>
      </button>
    </div>
  </div>
</aside>
