<div class="flex justify-between items-center gap-4 py-4 px-8 border-b border-slate-100 bg-white/90 backdrop-blur-sm sticky top-0 z-20">
  <p class="text-base font-medium text-slate-500 hidden sm:block">Fire Extinguisher Management</p>

  <div class="flex items-center gap-2 ml-auto">
    <a routerLink="/shop"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-50 transition-colors">
      <i data-lucide="shopping-cart" class="w-5 h-5"></i>
      <span class="hidden md:inline">Shop</span>
    </a>
    <a routerLink="/my-orders"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-50 transition-colors">
      <i data-lucide="package" class="w-5 h-5"></i>
      <span class="hidden md:inline">Orders</span>
    </a>
    <a routerLink="/notifications" title="Notifications"
      class="relative w-11 h-11 rounded-xl border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
      <i data-lucide="bell" class="w-5 h-5"></i>
      <span *ngIf="unreadCount > 0"
        class="absolute -top-1 -right-1 min-w-[1.25rem] h-5 px-1 rounded-full bg-red-500 text-white text-xs font-bold flex items-center justify-center">
        {{ unreadCount > 9 ? '9+' : unreadCount }}
      </span>
    </a>
    <a routerLink="/settings" title="Settings"
      class="w-11 h-11 rounded-xl border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </a>
  </div>
</div>
