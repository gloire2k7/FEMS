<div class="flex justify-between items-center gap-4 py-4 px-4 md:px-8 border-b border-slate-100 bg-white/90 backdrop-blur-sm sticky top-0 z-20">
  <div class="flex items-center gap-3 min-w-0">
    <button type="button" (click)="sidebar.toggleMobile()"
      class="lg:hidden w-10 h-10 rounded-xl border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-50">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <p class="text-sm md:text-base font-medium text-slate-500 truncate">Inspector · Field operations</p>
  </div>

  <div class="flex items-center gap-2 shrink-0">
    <span class="hidden sm:inline text-sm font-semibold text-[#0B1437] truncate max-w-[140px]">{{ userName }}</span>
    <a routerLink="/inspector-notifications" title="Notifications"
      class="relative w-11 h-11 rounded-xl border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
      <i data-lucide="bell" class="w-5 h-5"></i>
      <span *ngIf="unreadCount > 0"
        class="absolute -top-1 -right-1 min-w-[1.25rem] h-5 px-1 rounded-full bg-red-500 text-white text-xs font-bold flex items-center justify-center">
        {{ unreadCount > 9 ? '9+' : unreadCount }}
      </span>
    </a>
    <a routerLink="/inspector-settings" title="Settings"
      class="w-11 h-11 rounded-xl border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </a>
  </div>
</div>
