<div class="flex justify-between items-center gap-4 py-4 px-8 border-b border-slate-100 bg-white/90 backdrop-blur-sm sticky top-0 z-20">
  <p class="text-base font-medium text-slate-500 hidden sm:block">Super Admin · Platform control</p>

  <div class="flex items-center gap-2 ml-auto">
    <a routerLink="/super-admin-clients" [queryParams]="{ tab: 'pending' }"
      class="relative flex items-center gap-2 px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-50 transition-colors">
      <i data-lucide="building-2" class="w-5 h-5"></i>
      <span class="hidden md:inline">Clients</span>
      <span *ngIf="pendingClients > 0"
        class="absolute -top-1 -right-1 min-w-[1.25rem] h-5 px-1 rounded-full bg-amber-500 text-white text-xs font-bold flex items-center justify-center">
        {{ pendingClients > 9 ? '9+' : pendingClients }}
      </span>
    </a>
    <a routerLink="/super-admin-add-admin"
      class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-base font-medium text-slate-600 hover:bg-slate-50 transition-colors">
      <i data-lucide="user-plus" class="w-5 h-5"></i>
      <span class="hidden md:inline">Add admin</span>
    </a>
    <a routerLink="/super-admin-reports" title="Reports"
      class="w-11 h-11 rounded-xl border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
      <i data-lucide="file-bar-chart" class="w-5 h-5"></i>
    </a>
  </div>
</div>
