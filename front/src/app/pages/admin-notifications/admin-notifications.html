<div class="client-page pb-8">

  <section class="client-hero">
    <div class="client-hero-inner flex flex-col sm:flex-row sm:items-end sm:justify-between gap-5">
      <div>
        <p class="client-hero-eyebrow">Inbox</p>
        <h1 class="client-hero-title">Notifications</h1>
        <p class="client-hero-sub">
          {{ unreadCount > 0 ? unreadCount + ' unread' : 'You are all caught up.' }}
        </p>
      </div>
      <button *ngIf="unreadCount > 0" type="button" (click)="markAllAsRead()" class="client-hero-btn shrink-0 border-0 cursor-pointer">
        <i data-lucide="check-check" class="w-5 h-5"></i>
        Mark all read
      </button>
    </div>
  </section>

  <div class="flex flex-wrap gap-2">
    <button type="button" (click)="setFilter('all')"
      class="px-4 py-2 rounded-xl text-sm font-semibold border transition-colors"
      [class.bg-[#0B1437]]="filter === 'all'" [class.text-white]="filter === 'all'"
      [class.border-slate-200]="filter !== 'all'" [class.text-slate-600]="filter !== 'all'">
      All
    </button>
    <button type="button" (click)="setFilter('unread')"
      class="px-4 py-2 rounded-xl text-sm font-semibold border transition-colors"
      [class.bg-[#0B1437]]="filter === 'unread'" [class.text-white]="filter === 'unread'"
      [class.border-slate-200]="filter !== 'unread'" [class.text-slate-600]="filter !== 'unread'">
      Unread ({{ unreadCount }})
    </button>
  </div>

  <section *ngIf="list.length === 0" class="client-card client-empty">
    <div class="client-empty-icon">
      <i data-lucide="bell-off" class="w-8 h-8"></i>
    </div>
    <p class="text-lg font-semibold text-[#0B1437]">No notifications</p>
    <p class="text-base text-slate-500 mt-2">
      {{ filter === 'unread' ? 'No unread items right now.' : 'Alerts about orders, clients, and stock will appear here.' }}
    </p>
  </section>

  <section *ngIf="list.length > 0" class="space-y-3">
    <button type="button" *ngFor="let n of list" (click)="openNotification(n)"
      class="client-card client-card--lift w-full text-left p-5 flex items-start gap-4 transition-colors"
      [class.ring-2]="!n.read" [class.ring-[#0B1437]/10]="!n.read">
      <span class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0" [ngClass]="n.iconClass">
        <i [attr.data-lucide]="n.icon" class="w-5 h-5"></i>
      </span>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <h3 class="text-base font-semibold text-[#0B1437]" [class.text-slate-500]="n.read">{{ n.title }}</h3>
          <span *ngIf="!n.read" class="w-2 h-2 rounded-full bg-[#0B1437] shrink-0 mt-2"></span>
        </div>
        <p class="text-sm text-slate-500 mt-1 leading-relaxed">{{ n.message }}</p>
        <p class="text-xs text-slate-400 mt-2">{{ n.time }}</p>
      </div>
      <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 shrink-0 mt-1"></i>
    </button>
  </section>

</div>
