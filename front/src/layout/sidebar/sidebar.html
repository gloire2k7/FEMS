<div class="sticky top-0 h-screen shrink-0 flex font-['Poppins']">
  <aside class="w-64 bg-gradient-to-b from-[#0B1437] to-[#020617] p-6 flex flex-col overflow-y-auto">
    <div class="flex items-center gap-3 mb-10 pl-1">
      <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center">
        <i data-lucide="flame" class="w-5 h-5 text-white"></i>
      </div>
      <span class="text-2xl font-bold text-white tracking-wide">FEMS</span>
    </div>

    <nav class="space-y-1 text-base">
      <a routerLink="/dashboard" routerLinkActive="bg-white/10 text-white" [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="layout-dashboard" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Dashboard</span>
      </a>

      <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider px-4 pt-8 pb-3">My account</p>

      <a routerLink="/extinguishers" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="flame" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">My extinguishers</span>
      </a>
      <a routerLink="/locations" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="map-pin" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">My locations</span>
      </a>
      <a routerLink="/place-order" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="clipboard-list" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Place order</span>
      </a>
      <a routerLink="/my-orders" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="package" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">My orders</span>
      </a>

      <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider px-4 pt-8 pb-3">Support</p>

      <a routerLink="/service-requests" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="wrench" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Service requests</span>
      </a>
      <a routerLink="/inspectors" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="user-check" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Inspectors</span>
      </a>
      <a routerLink="/reports" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="file-text" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Reports</span>
      </a>
      <a routerLink="/notifications" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="bell" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Notifications</span>
      </a>
      <a routerLink="/settings" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="settings" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">Settings</span>
      </a>
      <a routerLink="/assistant" routerLinkActive="bg-white/10 text-white"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-white/5 hover:text-white transition-colors">
        <i data-lucide="sparkles" class="w-5 h-5 shrink-0"></i>
        <span class="font-medium">AI Assistant</span>
      </a>
    </nav>

    <div class="mt-auto pt-8">
      <div class="bg-white/5 rounded-xl p-4 flex items-center gap-3 border border-white/5">
        <img [src]="'https://ui-avatars.com/api/?name=' + userName + '&background=3B82F6&color=fff'" alt=""
          class="w-10 h-10 rounded-full shrink-0">
        <div class="min-w-0 flex-1">
          <p class="text-sm text-slate-400">Signed in as</p>
          <p class="text-base font-semibold text-white truncate">{{ userName }}</p>
        </div>
        <button (click)="onLogout()" title="Sign out"
          class="p-2 rounded-lg hover:bg-white/10 text-slate-400 hover:text-red-400 transition-colors">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </aside>
</div>
